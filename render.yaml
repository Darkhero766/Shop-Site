databases:
  - name: shopy-db
    databaseName: shopy
    user: shopy
    plan: free

services:
  # ── Backend API (Express + Drizzle + PostgreSQL) ─────────────────────────
  - type: web
    name: shopy-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopy-db
          property: connectionString

  # ── Frontend (React + Vite — talks to Supabase directly) ─────────────────
  - type: web
    name: shopy-frontend
    runtime: static
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/shopy run build
    staticPublishPath: ./artifacts/shopy/dist/public
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: BASE_PATH
        value: /
      # Set these in the Render dashboard — do not commit real values
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_ADMIN_EMAIL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
