services:
  - type: web
    name: shopy-frontend
    runtime: static
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/shopy run build
    staticPublishPath: ./artifacts/shopy/dist/public
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: BASE_PATH
        value: /
      # Set these three in the Render dashboard — do not commit real values
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_ADMIN_EMAIL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
